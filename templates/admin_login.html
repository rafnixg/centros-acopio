<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Centros de Acopio Venezuela</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    </style>
</head>
<body>
    <div class="form-card" style="width:100%;max-width:400px;">
        <h2 style="text-align:center;">🔐 Acceso Administrativo</h2>
        {% if error %}
        <div style="background:#f8d7da;color:#721c24;padding:0.75rem;border-radius:var(--radius-sm);margin-bottom:1rem;text-align:center;">
            {{ error }}
        </div>
        {% endif %}
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>Contraseña de administrador</label>
                <input type="password" name="password" required placeholder="Ingresa la contraseña">
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">Ingresar</button>
        </form>
        <div style="text-align:center;margin-top:1rem;">
            <a href="/" style="color:var(--secondary);">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
